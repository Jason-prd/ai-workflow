# AI鑷姩鍖栧伐浣滄祦 - Nginx 鐢熶骇鐜閰嶇疆 (HTTPS)
# ========================================================
# 浣跨敤璇存槑:
# 1. 鏇挎崲 ai-workflow.local 涓哄疄闄呭煙鍚?# 2. 纭繚 SSL 璇佷功璺緞姝ｇ‘: /etc/nginx/ssl/fullchain.pem, /etc/nginx/ssl/privkey.pem
# 3. 娴嬭瘯閰嶇疆: nginx -t
# 4. 閲嶆柊鍔犺浇: nginx -s reload

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 鏃ュ織鏍煎紡
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # 鎬ц兘浼樺寲
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip 鍘嬬缉
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript application/x-javascript;
    gzip_min_length 1000;

    # ========== 闄愭祦閰嶇疆 ==========
    # 閫熺巼闄愬埗: 10 req/s, burst=20
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # ========== 涓婃父鏈嶅姟 ==========
    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    # ========== 榛樿瀹夊叏澶?(鐢ㄤ簬 HTTP 鍝嶅簲) ==========
    # 杩欎簺澶翠細鍦?HTTPS server 涓瑕嗙洊,杩欓噷浣滀负澶囩敤
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # ========== HTTP 鏈嶅姟鍣?(绔彛 80) - 閲嶅畾鍚戝埌 HTTPS ==========
    server {
        listen 80;
        server_name ai-workflow.local www.ai-workflow.local;

        # 鍋ュ悍妫€鏌ョ鐐?(HTTP 涔熼渶瑕?鐢ㄤ簬 Let's Encrypt 楠岃瘉)
        location /health {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            access_log off;
        }

        # ACME Challenge (Let's Encrypt 鑷姩缁湡)
        location /.well-known/acme-challenge/ {
            root /usr/share/nginx/html;
            try_files $uri =404;
        }

        # 鎵€鏈夊叾浠栬姹傞噸瀹氬悜鍒?HTTPS
        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # ========== HTTPS 鏈嶅姟鍣?(绔彛 443) ==========
    server {
        listen 443 ssl;
        http2 on;
        server_name ai-workflow.local www.ai-workflow.local;

        # ========== SSL 閰嶇疆 ==========
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # SSL 浼氳瘽浼樺寲
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        # 鍗忚鍜屽姞瀵嗗浠?(鐜颁唬瀹夊叏閰嶇疆)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ========== 瀹夊叏鍝嶅簲澶?==========
        # HSTS - 寮哄埗 HTTPS (63072000绉?= 2骞?
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # X-Frame-Options - 闃叉鐐瑰嚮鍔寔
        add_header X-Frame-Options "SAMEORIGIN" always;

        # X-Content-Type-Options - 闃叉 MIME 绫诲瀷 sniffing
        add_header X-Content-Type-Options "nosniff" always;

        # Content-Security-Policy - 鍐呭瀹夊叏绛栫暐
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: https:;" always;

        # Referrer-Policy - Referrer 绛栫暐
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # X-XSS-Protection (鏃х増娴忚鍣ㄦ敮鎸?
        add_header X-XSS-Protection "1; mode=block" always;

        # ========== 鍋ュ悍妫€鏌?==========
        location /health {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }

        # ========== API 浠ｇ悊 (甯﹂檺娴? ==========
        location /api {
            # 閫熺巼闄愬埗: 10 req/s, burst 20
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 瓒呮椂閰嶇疆
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Keepalive 杩炴帴
            proxy_set_header Connection "";
        }

        # ========== WebSocket 浠ｇ悊 ==========
        location /ws {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 鍗囩骇鎵€闇€鐨?HTTP 澶?            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 闀挎椂闂磋繛鎺ョ殑瓒呮椂 (WebSocket 闇€瑕?
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 86400s;  # 24灏忔椂

            proxy_set_header Connection "";
        }

        # ========== 闈欐€佹枃浠?==========
        location /static {
            alias /usr/share/nginx/html/static;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ========== OpenAPI 鏂囨。 ==========
        location /docs {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========== OpenAPI redoc ==========
        location /redoc {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========== 鍓嶇椤甸潰 (SPA 璺敱) ==========
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # ========== 閿欒椤甸潰 (JSON 鏍煎紡) ==========
        error_page 500 502 503 504 /50x.json;
        location = /50x.json {
            internal;
            default_type application/json;
            return 500 '{"error": "Internal Server Error", "message": "鏈嶅姟鍣ㄥ唴閮ㄩ敊璇紝璇风◢鍚庨噸璇?}';
        }
    }
}